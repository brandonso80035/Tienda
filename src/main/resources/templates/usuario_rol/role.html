<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <!-- Roles tiene que ser mas una vista de los que existan o se usen. -->
    
<head th:replace="~{general/fragmentos :: head}">
    <title>[[#{plantilla.troles}]]</title>
</head>

<body>
<header th:replace="~{general/fragmentos :: header}"/>

<section class="container mt-5">
    
    <!-- Título -->
    <h2 class="mb-4">
        <i class="fas fa-user-shield"></i> [[#{plantilla.troles}]]
    </h2>

    <!-- Tabla -->
    <div class="card shadow-sm">
        <!-- Encabezado de la tabla -->
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Listado de Roles</h5>
        </div>

        <div class="card-body">

            <div class="row mb-3">
                <div class="col-md-6">
                    <strong>Total de roles:</strong>
                    <span th:text="${totalRoles}"></span>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(roles)}" class="alert alert-warning text-center">
                No hay roles registrados.
            </div>

            <table th:unless="${#lists.isEmpty(roles)}" class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Rol</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Inicia la lista de roles -->
                    <tr th:each="rol, stat : ${roles}">
                        
                        <!-- Se genera un numero de rol, de los que hayan. -->
                        <td th:text="${stat.index + 1}"></td>
                        
                        <!-- Nombre del rol -->
                        <td th:text="${rol}"></td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</section>

<footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
